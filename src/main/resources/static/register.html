<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Bookstore</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 400px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #2ecc71; }
        .msg {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .success { background:#d4edda; color:#155724; }
        .error   { background:#f8d7da; color:#721c24; }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .link a { color: #3498db; text-decoration: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="card">
    <h2><i class="fa-solid fa-user-plus"></i> Register</h2>
    
    <!-- Registration Type Selection -->
    <div style="margin-bottom: 20px;">
        <label style="font-weight: bold; margin-bottom: 8px; display: block;">Registration Type:</label>
        <select id="registrationType" onchange="toggleRegistrationFields()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 15px;">
            <option value="customer">Customer Registration</option>
            <option value="admin">Admin Registration</option>
        </select>
    </div>

    <!-- Common Fields -->
    <input type="text"
           id="username"
           placeholder="Username"/>
    <input type="email"
           id="email"
           placeholder="Email"/>
    <input type="password"
           id="password"
           placeholder="Password (min 6 chars)"/>
    
    <!-- Admin-specific field (hidden by default) -->
    <div id="adminCodeField" style="display: none; margin-bottom: 15px;">
        <label style="font-weight: bold; margin-bottom: 5px; display: block;">Admin Code:</label>
        <input type="password"
               id="adminCode"
               placeholder="Enter admin registration code"/>
    </div>

    <!-- Hidden role field -->
    <input type="hidden" id="role" value="customer"/>
    
    <button onclick="register()">Register</button>
    <div class="msg" id="msg"></div>
    <div class="link">
        Already have an account?
        <a href="/login.html">Login</a>
    </div>
</div>

<script>
    // Toggle registration fields based on type
    function toggleRegistrationFields() {
        const regType = document.getElementById('registrationType').value;
        const adminField = document.getElementById('adminCodeField');
        const roleField = document.getElementById('role');
        
        if (regType === 'admin') {
            adminField.style.display = 'block';
            roleField.value = 'admin';
        } else {
            adminField.style.display = 'none';
            roleField.value = 'customer';
        }
    }

    async function register() {
        const username = document.getElementById('username').value;
        const email    = document.getElementById('email').value;
        let password = document.getElementById('password').value;
        const role     = document.getElementById('role').value;
        const regType  = document.getElementById('registrationType').value;

        // Basic validation for username and email
        if (!username || !email) {
            showMsg('Please fill in username and email.', 'error');
            return;
        }

        // Admin registration validation
        if (regType === 'admin') {
            const adminCode = document.getElementById('adminCode').value;
            console.log('Admin code entered:', adminCode);
            
            // For admin registration, admin code must be "123"
            if (!adminCode || adminCode !== '123') {
                console.log('Admin validation failed - invalid admin code');
                showMsg('Admin registration requires valid admin code', 'error');
                return;
            }
            
            // For admin registration, require actual password
            if (!password) {
                showMsg('Admin registration requires password', 'error');
                return;
            }
            
            console.log('Admin validation passed - using actual password');
        } else {
            // Customer registration requires password
            if (!password) {
                showMsg('Please fill in all fields.', 'error');
                return;
            }
        }

        try {
            const requestData = { username, email, password, role };
            console.log('Sending registration data:', requestData);
            
            const response = await fetch(
                'http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

            const data = await response.json();
            console.log('Registration response:', data);

            if (response.ok) {
                showMsg(data.message, 'success');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
            } else {
                showMsg(data.error, 'error');
            }
        } catch (err) {
            showMsg('Server error. Is Spring Boot running?',
                'error');
        }
    }

    function showMsg(text, type) {
        const msg = document.getElementById('msg');
        msg.textContent   = text;
        msg.className     = 'msg ' + type;
        msg.style.display = 'block';
    }
</script>
</body>
</html>
